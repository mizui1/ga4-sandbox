            <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-WM9JNK3D" height="0" width="0" style="display: none; visibility: hidden"></iframe>

        <header class="site-header">
            <div class="container nav-wrap">
                <a class="brand" href="index.html">GTM Sandbox</a>
                <nav class="main-nav" aria-label="メインナビゲーション">
                    <a href="index.html">Top</a>

                </nav>
            </div>
        </header>

        <main>
            <section class="page-head">
                <div class="container">
                    <p class="page-kicker">Contact Form</p>
                    <h1>お問い合わせフォーム</h1>
                </div>
            </section>

            <section class="section">
                <div class="container content">
                    <form id="contact-form" class="form-layout" novalidate>
                        <label>
                            氏名
                            <input type="text" name="name" placeholder="山田 太郎" required />
                        </label>

                        <label>
                            メールアドレス
                            <input type="email" name="email" placeholder="example@mail.com" required />
                        </label>

                        <label>
                            お問い合わせ種別
                            <select name="inquiryType" required>
                                <option value="">選択してください</option>
                                <option value="estimate">見積もり相談</option>
                                <option value="analysis">アクセス解析支援</option>
                                <option value="other">その他</option>
                            </select>
                        </label>

                        <label>
                            お問い合わせ内容
                            <textarea name="message" placeholder="ご相談内容をご記入ください" required></textarea>
                        </label>

                        <p class="form-note">このフォームはGTM/GA4のテスト用です。送信でサンクスページに遷移します。</p>

                        <button type="submit" class="btn btn-primary">送信する</button>
                    </form>
                </div>
            </section>
        </main>

        <footer class="site-footer">
            <div class="container footer-inner">
                <p>GTM Sandbox for GA4 testing</p>
                <small>&copy; 2026 GTM Sandbox</small>
